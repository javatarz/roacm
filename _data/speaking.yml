# Speaking Engagements - Karun Japhet
#
# Comprehensive, MANUALLY-maintained record of every speaking engagement -
# including talks with no public recording and repeat deliveries of the same
# talk at multiple venues.
#
# This is the single source of truth for the talks page and the homepage.
#
# Model: one entry per TALK. Each talk has a `deliveries` list (venue list),
# so repeat deliveries appear under a single talk rather than as duplicates.
#
# Fields:
#   title         Talk title
#   type          talk | panel | podcast | workshop | bof
#   date          Top-level sort key. The timeline renders newest-first by this.
#                 Set it to the primary (card-displayed) delivery's date.
#   video_id      YouTube id if recorded (the video to link to); omit if not recorded
#   duration      Talk length for recorded talks, e.g. "2h 5m"; shown on the badge
#   image         Card/timeline thumbnail (used when there is no video_id)
#   description   One-line summary, shown under each timeline entry
#   deliveries:   One entry per time/place the talk was given
#     - event       Conference / series / meetup name
#       location    City, Country (or "Remote")
#       date        YYYY-MM-DD (use YYYY-MM-01 when only month is known)
#       url         Deep link to the event page (omit if none exists)
#       recorded    true if this specific delivery is the recorded one
#       co_speakers Optional list, per-delivery (co-speakers vary by venue).
#                   Each is either a plain name or { name, linkedin } to link it.

- title: "Engineer the Environment, Not Just the Prompt"
