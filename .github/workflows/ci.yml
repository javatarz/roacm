name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    paths-ignore:
      - "LICENSE"
      - "README.md"
      - "Dockerfile"
      - "jekyll.thor"
  schedule:
    - cron: '30 4 * * *'  # 10:00 AM IST (4:30 AM UTC) daily
  pull_request:
    branches: [ main ]
    paths-ignore:
      - "LICENSE"
      - "README.md"
      - "Dockerfile"
      - "local_run_native.sh"
      - "jekyll.thor"
  workflow_dispatch:
    inputs:
      post_path:
        description: 'Path to post file for dev.to sync (e.g., _posts/2024-12-25-my-post.markdown)'
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ============================================================================
  # CHANGE DETECTION
  # ============================================================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-24.04-arm
    outputs:
      theme: ${{ github.event_name == 'schedule' && 'true' || steps.filter.outputs.theme }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        if: github.event_name != 'schedule'
        id: filter
        with:
          filters: |
            theme:
              - 'assets/css/**'
              - 'assets/js/**'
              - '_layouts/**'
              - '_includes/**'
              - 'test-suite/**'
              - '.github/workflows/ci.yml'
              - '.github/actions/**'
              - 'package.json'
              - 'package-lock.json'

  # ============================================================================
  # BUILD
  # ============================================================================

  build:
    name: Build Site
    runs-on: ubuntu-24.04-arm
    needs: changes
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup dependencies
        uses: ./.github/actions/setup-deps
        with:
          include-ruby: 'true'

      - name: Bundle JavaScript for production
        run: npm run build:js

      - name: Build site
        run: bundle exec jekyll build

      - name: Minify CSS
        run: npm run build:css

      - name: Restore image optimization cache
        id: image-cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: _site/assets/images/
          key: ${{ runner.os }}-${{ runner.arch }}-images-${{ hashFiles('assets/images/**', 'scripts/transform-images.mjs', 'scripts/optimize-images.mjs') }}

      - name: Transform images in HTML to picture elements
        run: npm run images:transform

      - name: Optimize and generate responsive images
        if: steps.image-cache.outputs.cache-hit != 'true'
        run: npm run images:optimize

      - name: Upload site artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: built-site
          path: _site/
          retention-days: 30

  # ============================================================================
  # CONTENT VALIDATION (runs on every change, gates deploy)
  # ============================================================================

  validate-content:
    name: Validate HTML Content
    runs-on: ubuntu-24.04-arm
    needs: build
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup dependencies
        uses: ./.github/actions/setup-deps
        with:
          include-ruby: 'true'

      - name: Download site artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: built-site
          path: _site/

      - name: Restore image optimization cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: _site/assets/images/
          key: ${{ runner.os }}-${{ runner.arch }}-images-${{ hashFiles('assets/images/**', 'scripts/transform-images.mjs', 'scripts/optimize-images.mjs') }}

      - name: Validate HTML structure
        run: npm run lint:html

      - name: Check internal links and images
        run: |
          bundle exec htmlproofer \
            --disable-external \
            --no-enforce-https \
            --ignore-urls "/\/assets\/images\/uploads\//,/^portableapps\.com/,/^karunab\.com/,/^Imagine%20Cup/,/^Clean%20File%20List/" \
            _site/

      - name: Validate Atom feed
        run: node .github/scripts/validate-atom-feed.js

  # ============================================================================
  # TESTING JOBS (run in parallel when theme files change)
  # ============================================================================

  lint-and-validate:
    name: Lint and Validate
    runs-on: ubuntu-24.04-arm
    needs: changes
    if: needs.changes.outputs.theme == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup dependencies
        uses: ./.github/actions/setup-deps
        with:
          include-ruby: 'true'

      - name: Lint CSS
        run: npm run lint:css

      - name: Lint JavaScript
        run: npm run lint:js

      - name: Build site for HTML validation
        run: bundle exec jekyll build

      - name: Validate HTML
        run: npm run lint:html

      - name: Detect dead code
        run: npm run audit:dead-code

  visual-tests:
    name: Visual Tests (${{ matrix.label }})
    # arm64 runner (free for public repos): visual baselines are arm64-rendered
    # so they match what devs generate locally on Apple Silicon. Keep this in
    # sync with the --platform in scripts/visual-snapshots.sh.
    runs-on: ubuntu-24.04-arm
    needs: changes
    if: needs.changes.outputs.theme == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - browser: chromium
            label: chromium
            grep: '@visual'
            grep_invert: ''
            workers: '3'
          - browser: firefox
            label: firefox
            grep: '@visual'
            grep_invert: ''
            workers: '3'
          # webkit split into two parallel shards by page weight, not count (~29 tests each):
          # Shard 1: everything except Tier 2 — short pages + mobile-menu + theme (~39 tests, fast renders).
          # Shard 2: Tier 2 only — heavy fullPage posts (about, talks, long blog posts — ~20 tests, slow renders).
          # Grep-based rather than --shard because Playwright's file-based shard gives 54:5 distribution.
          # workers=2 for webkit-2: fullPage long-post renders are sensitive to CPU contention at workers=3.
          - browser: webkit
            label: webkit-1
            grep: '@visual'
            grep_invert: 'Tier 2'
            workers: '3'
          - browser: webkit
            label: webkit-2
            grep: 'Tier 2.*@visual'
            grep_invert: ''
            workers: '2'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup dependencies
        uses: ./.github/actions/setup-deps
        with:
          include-ruby: 'true'

      # Renders in the pinned Playwright container via the SAME script devs run
      # locally, so committed Linux baselines match CI byte-for-byte.
      # Baselines are regenerated locally with `npm run snapshots`, never in CI.
      - name: Run visual tests (${{ matrix.label }})
        env:
          PLAYWRIGHT_WORKERS: ${{ matrix.workers }}
        run: |
          GREP='${{ matrix.grep }}'
          INVERT='${{ matrix.grep_invert }}'
          if [ -n "$INVERT" ]; then
            bash scripts/visual-snapshots.sh --project=${{ matrix.browser }} --grep="$GREP" --grep-invert="$INVERT"
          else
            bash scripts/visual-snapshots.sh --project=${{ matrix.browser }} --grep="$GREP"
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report-${{ matrix.label }}
          path: test-suite/reports/playwright-html
          retention-days: 7

      # On a real diff, this holds the actual + diff images so you can see what
      # changed (then run `npm run snapshots` locally to accept it).
      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-screenshots-${{ matrix.label }}
          path: test-suite/reports/playwright-results/**/*.png
          retention-days: 7

  functional-e2e-tests:
    name: Functional E2E Tests
    # arm64 runner: consistent with other jobs for shared npm/Ruby/Playwright caching
    runs-on: ubuntu-24.04-arm
    needs: changes
    if: needs.changes.outputs.theme == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup dependencies
        uses: ./.github/actions/setup-deps
        with:
          include-ruby: 'true'
          playwright-browser: chromium
          prebuild-js: 'true'

      - name: Run functional E2E tests (includes a11y)
        run: npm run test:e2e -- --project=chromium --grep-invert=@visual
        env:
          PLAYWRIGHT_WORKERS: '3'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: functional-e2e-report
          path: test-suite/reports/playwright-html
          retention-days: 7

  performance-tests:
    name: Performance Tests (Lighthouse)
    runs-on: ubuntu-24.04-arm
    needs: [changes, build]
    if: needs.changes.outputs.theme == 'true' && needs.build.result == 'success'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup dependencies
        uses: ./.github/actions/setup-deps
        with:
          include-ruby: 'false'
          playwright-browser: chromium
          skip-system-deps: 'true'

      - name: Set CHROME_PATH for Lighthouse
        run: echo "CHROME_PATH=$(find ~/.cache/ms-playwright -name 'headless_shell' | head -1)" >> $GITHUB_ENV

      - name: Download site artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: built-site
          path: _site/

      - name: Run Lighthouse CI
        run: npm run test:lighthouse
        env:
          LIGHTHOUSE_USE_BUILT_SITE: 'true'

      - name: Upload Lighthouse Report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: lighthouse-report
          path: test-suite/reports/lighthouse
          retention-days: 7

      - name: Comment PR with Lighthouse Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const fn = require('./.github/scripts/lighthouse-comment.js')
            await fn({github, context})

  # ============================================================================
  # BUILD AND DEPLOY
  # ============================================================================

  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-24.04-arm
    needs: [changes, build, validate-content, lint-and-validate, visual-tests, functional-e2e-tests, performance-tests]
    # Run if build and HTML validation succeeded AND (all tests passed OR all tests were skipped for non-theme changes)
    # Do NOT run if build, validation, or any test job failed
    if: |
      always() &&
      needs.build.result == 'success' &&
      needs.validate-content.result == 'success' &&
      (needs.changes.outputs.theme == 'false' ||
       (needs.lint-and-validate.result == 'success' &&
        needs.visual-tests.result == 'success' &&
        needs.functional-e2e-tests.result == 'success' &&
        needs.performance-tests.result == 'success'))
    steps:
      - name: Download site artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: built-site
          path: _site/

      - name: Deploy to S3
        if: success() && github.ref == 'refs/heads/main'
        run: |
          # Assets: images, fonts, JS, CSS — 1-day browser cache
          aws s3 sync ./_site/assets s3://${{ vars.AWS_S3_BUCKET }}/assets \
            --cache-control "public, max-age=86400" \
            --acl public-read
          # HTML, feed, sitemaps — 5-min browser cache with must-revalidate; --delete removes old pages
          aws s3 sync ./_site s3://${{ vars.AWS_S3_BUCKET }} \
            --exclude "assets/*" --exclude "*.map" \
            --cache-control "public, max-age=300, must-revalidate" \
            --acl public-read --delete
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1

      - name: Purge Cloudflare Cache
        if: success() && github.ref == 'refs/heads/main'
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'

  # ============================================================================
  # SMOKE TEST
  # ============================================================================

  smoke-test:
    name: Smoke Test (prod)
    runs-on: ubuntu-24.04-arm
    needs: build-and-deploy
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request' &&
      needs.build-and-deploy.result == 'success'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Derive latest post URL
        id: latest-post
        run: bash .github/scripts/derive-latest-post-url.sh

      - name: Smoke test prod endpoints
        run: bash .github/scripts/smoke-test.sh
        env:
          LATEST_POST_URL: ${{ steps.latest-post.outputs.url }}
          LATEST_POST_TITLE: ${{ steps.latest-post.outputs.title }}

  # ============================================================================
  # AUTO-ROLLBACK (triggered by smoke test failure)
  # ============================================================================

  rollback:
    name: Auto-Rollback
    runs-on: ubuntu-24.04-arm
    needs: smoke-test
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request' &&
      needs.smoke-test.result == 'failure'
    permissions:
      actions: read
    steps:
      - name: Find last successful deploy run
        id: find-run
        run: bash .github/scripts/find-rollback-run.sh
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Download last good built-site
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: built-site
          path: _site/
          run-id: ${{ steps.find-run.outputs.run_id }}
          github-token: ${{ github.token }}

      - name: Deploy rolled-back site to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          aws s3 sync ./_site/assets s3://${{ vars.AWS_S3_BUCKET }}/assets \
            --cache-control "public, max-age=86400" \
            --acl public-read
          aws s3 sync ./_site s3://${{ vars.AWS_S3_BUCKET }} \
            --exclude "assets/*" --exclude "*.map" \
            --cache-control "public, max-age=300, must-revalidate" \
            --acl public-read --delete

      - name: Purge Cloudflare after rollback
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'

      - name: Verify rollback health
        run: |
          SITE=https://karun.me
          sleep 15
          curl -fsS -o /dev/null "$SITE/" && echo "✅ Homepage OK"
          curl -fsS -o /dev/null "$SITE/atom.xml" && echo "✅ atom.xml OK"

      - name: Fail pipeline to flag bad commit
        run: |
          echo "::error::Smoke test failed — site auto-rolled back to previous version. Investigate this commit."
          exit 1

  # ============================================================================
  # AI READINESS CHECK
  # ============================================================================

  nhs-score-check:
    name: NHS Score Check
    runs-on: ubuntu-24.04-arm
    needs: build-and-deploy
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request' &&
      needs.build-and-deploy.result == 'success'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
      - name: Check NHS score
        run: bash .github/scripts/nhs-score-check.sh

  # ============================================================================
  # TEST SUMMARY
  # ============================================================================

  test-summary:
    name: Test Summary
    runs-on: ubuntu-24.04-arm
    if: always()
    needs: [changes, build, validate-content, lint-and-validate, visual-tests, functional-e2e-tests, performance-tests, build-and-deploy, smoke-test, rollback]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
      - name: Check results
        run: bash .github/scripts/test-summary.sh
        env:
          THEME_CHANGED: ${{ needs.changes.outputs.theme }}
          VALIDATE_RESULT: ${{ needs.validate-content.result }}
          LINT_RESULT: ${{ needs.lint-and-validate.result }}
          VISUAL_RESULT: ${{ needs.visual-tests.result }}
          FUNCTIONAL_RESULT: ${{ needs.functional-e2e-tests.result }}
          PERF_RESULT: ${{ needs.performance-tests.result }}
          DEPLOY_RESULT: ${{ needs.build-and-deploy.result }}
          SMOKE_RESULT: ${{ needs.smoke-test.result }}

  # ============================================================================
  # DEV.TO PUBLISHING
  # ============================================================================

  devto-publish:
    name: dev.to Publish
    runs-on: ubuntu-24.04-arm
    needs: build-and-deploy
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request' &&
      needs.build-and-deploy.result == 'success'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Publish new posts to dev.to
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          SITE_URL: https://karun.me
          POST_PATH: ${{ github.event.inputs.post_path }}
        run: node .github/scripts/devto-publish.js

      - name: Commit tracking file
        if: success()
        run: |
          if [ -f .devto-posts.json ] && ! git diff --quiet .devto-posts.json 2>/dev/null; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .devto-posts.json
            git commit -m "Update dev.to tracking"
            git push
          fi
