name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    paths-ignore:
      - "LICENSE"
      - "README.md"
      - "Dockerfile"
      - "jekyll.thor"
  schedule:
    - cron: '30 4 * * *'  # 10:00 AM IST (4:30 AM UTC) daily
  pull_request:
    branches: [ main ]
    paths-ignore:
      - "LICENSE"
      - "README.md"
      - "Dockerfile"
      - "local_run_native.sh"
      - "jekyll.thor"
  workflow_dispatch:
    inputs:
      post_path:
        description: 'Path to post file for dev.to sync (e.g., _posts/2024-12-25-my-post.markdown)'
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # CHANGE DETECTION
  # ============================================================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-24.04-arm
    outputs:
      theme: ${{ github.event_name == 'schedule' && 'true' || steps.filter.outputs.theme }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        if: github.event_name != 'schedule'
        id: filter
        with:
          filters: |
            theme:
              - 'assets/css/**'
              - 'assets/js/**'
              - '_layouts/**'
              - '_includes/**'
              - 'test-suite/**'
              - '.github/workflows/ci.yml'
              - '.github/actions/**'
              - 'package.json'
              - 'package-lock.json'

  # ============================================================================
  # BUILD
  # ============================================================================

  build:
    name: Build Site
    runs-on: ubuntu-24.04-arm
    needs: changes
    steps:
      - uses: actions/checkout@v6

      - name: Setup dependencies
        uses: ./.github/actions/setup-deps
        with:
          include-ruby: 'true'

      - name: Bundle JavaScript for production
        run: npm run build:js

      - name: Build site
        run: bundle exec jekyll build

      - name: Minify CSS
        run: npm run build:css

      - name: Restore image optimization cache
        id: image-cache
        uses: actions/cache@v5
        with:
          path: _site/assets/images/
          key: ${{ runner.os }}-${{ runner.arch }}-images-${{ hashFiles('assets/images/**') }}

      - name: Transform images in HTML to picture elements
        run: npm run images:transform

      - name: Optimize and generate responsive images
        if: steps.image-cache.outputs.cache-hit != 'true'
        run: npm run images:optimize

      - name: Upload site artifact
        uses: actions/upload-artifact@v7
        with:
          name: built-site
          path: _site/
          retention-days: 1

  # ============================================================================
  # CONTENT VALIDATION (runs on every change, gates deploy)
  # ============================================================================

  validate-content:
    name: Validate HTML Content
    runs-on: ubuntu-24.04-arm
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Setup dependencies
        uses: ./.github/actions/setup-deps
        with:
          include-ruby: 'true'

      - name: Download site artifact
        uses: actions/download-artifact@v8
        with:
          name: built-site
          path: _site/

      - name: Validate HTML structure
        run: npm run lint:html

      - name: Check internal links and images
        run: |
          bundle exec htmlproofer \
            --disable-external \
            --no-enforce-https \
            --ignore-urls "/\/assets\/images\/uploads\//,/^portableapps\.com/,/^karunab\.com/,/^Imagine%20Cup/,/^Clean%20File%20List/" \
            _site/

  # ============================================================================
  # TESTING JOBS (run in parallel when theme files change)
  # ============================================================================

  lint-and-validate:
    name: Lint and Validate
    runs-on: ubuntu-24.04-arm
    needs: changes
    if: needs.changes.outputs.theme == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Setup dependencies
        uses: ./.github/actions/setup-deps
        with:
          include-ruby: 'true'

      - name: Lint CSS
        run: npm run lint:css

      - name: Lint JavaScript
        run: npm run lint:js

      - name: Build site for HTML validation
        run: bundle exec jekyll build

      - name: Validate HTML
        run: npm run lint:html

      - name: Detect dead code
        run: npm run audit:dead-code

  visual-tests:
    name: Visual Tests (${{ matrix.label }})
    # arm64 runner (free for public repos): visual baselines are arm64-rendered
    # so they match what devs generate locally on Apple Silicon. Keep this in
    # sync with the --platform in scripts/visual-snapshots.sh.
    runs-on: ubuntu-24.04-arm
    needs: changes
    if: needs.changes.outputs.theme == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - browser: chromium
            label: chromium
            grep: '@visual'
            grep_invert: ''
          - browser: firefox
            label: firefox
            grep: '@visual'
            grep_invert: ''
          # webkit split into two parallel shards by tier to halve execution time.
          # Shard 1: visual tiers 1+2 (~30 tests). Shard 2: tier 3 + theme + mobile-menu (~29 tests).
          # Grep-based rather than --shard because Playwright's file-based shard gives 54:5 distribution.
          - browser: webkit
            label: webkit-1
            grep: '(Tier 1|Tier 2).*@visual'
            grep_invert: ''
          - browser: webkit
            label: webkit-2
            grep: '@visual'
            grep_invert: 'Tier [12]'
    steps:
      - uses: actions/checkout@v6

      - name: Setup dependencies
        uses: ./.github/actions/setup-deps
        with:
          include-ruby: 'true'

      # Renders in the pinned Playwright container via the SAME script devs run
      # locally (scripts/visual-snapshots.sh), so committed Linux baselines match
      # CI byte-for-byte. Compare-only here — baselines are regenerated locally
      # with `npm run snapshots`, never in CI.
      - name: Run visual tests (${{ matrix.label }})
        run: |
          GREP='${{ matrix.grep }}'
          INVERT='${{ matrix.grep_invert }}'
          if [ -n "$INVERT" ]; then
            bash scripts/visual-snapshots.sh --project=${{ matrix.browser }} --grep="$GREP" --grep-invert="$INVERT"
          else
            bash scripts/visual-snapshots.sh --project=${{ matrix.browser }} --grep="$GREP"
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ matrix.label }}
          path: test-suite/reports/playwright-html
          retention-days: 7

      # On a real diff, this holds the actual + diff images so you can see what
      # changed (then run `npm run snapshots` locally to accept it).
      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-screenshots-${{ matrix.label }}
          path: test-suite/reports/playwright-results/**/*.png
          retention-days: 7

  functional-e2e-tests:
    name: Functional E2E Tests
    # arm64 runner: consistent with other jobs for shared npm/Ruby/Playwright caching
    runs-on: ubuntu-24.04-arm
    needs: changes
    if: needs.changes.outputs.theme == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Setup dependencies
        uses: ./.github/actions/setup-deps
        with:
          include-ruby: 'true'
          playwright-browser: chromium
          prebuild-js: 'true'

      - name: Run functional E2E tests (includes a11y)
        run: npm run test:e2e -- --project=chromium --grep-invert=@visual

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: functional-e2e-report
          path: test-suite/reports/playwright-html
          retention-days: 7

  performance-tests:
    name: Performance Tests (Lighthouse)
    runs-on: ubuntu-24.04-arm
    needs: [changes, build]
    if: needs.changes.outputs.theme == 'true' && needs.build.result == 'success'
    steps:
      - uses: actions/checkout@v6

      - name: Setup dependencies
        uses: ./.github/actions/setup-deps
        with:
          include-ruby: 'false'
          playwright-browser: chromium

      - name: Set CHROME_PATH for Lighthouse
        run: echo "CHROME_PATH=$(find ~/.cache/ms-playwright -name 'headless_shell' | head -1)" >> $GITHUB_ENV

      - name: Download site artifact
        uses: actions/download-artifact@v8
        with:
          name: built-site
          path: _site/

      - name: Run Lighthouse CI
        run: npm run test:lighthouse
        env:
          LIGHTHOUSE_USE_BUILT_SITE: 'true'

      - name: Upload Lighthouse Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-report
          path: test-suite/reports/lighthouse
          retention-days: 7

      - name: Comment PR with Lighthouse Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const reportPath = './test-suite/reports/lighthouse/manifest.json';
            if (fs.existsSync(reportPath)) {
              const manifest = JSON.parse(fs.readFileSync(reportPath));
              const summary = manifest[0].summary;

              const comment = `## 🔦 Lighthouse Results

              | Metric | Score |
              |--------|-------|
              | Performance | ${summary.performance * 100}% |
              | Accessibility | ${summary.accessibility * 100}% |
              | Best Practices | ${summary['best-practices'] * 100}% |
              | SEO | ${summary.seo * 100}% |
              `;

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }

  # ============================================================================
  # BUILD AND DEPLOY
  # ============================================================================

  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-24.04-arm
    needs: [changes, build, validate-content, lint-and-validate, visual-tests, functional-e2e-tests, performance-tests]
    # Run if build and HTML validation succeeded AND (all tests passed OR all tests were skipped for non-theme changes)
    # Do NOT run if build, validation, or any test job failed
    if: |
      always() &&
      needs.build.result == 'success' &&
      needs.validate-content.result == 'success' &&
      (needs.changes.outputs.theme == 'false' ||
       (needs.lint-and-validate.result == 'success' &&
        needs.visual-tests.result == 'success' &&
        needs.functional-e2e-tests.result == 'success' &&
        needs.performance-tests.result == 'success'))
    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v8
        with:
          name: built-site
          path: _site/

      - name: Deploy to S3
        if: success() && github.ref == 'refs/heads/main'
        run: |
          # Assets: images, fonts, JS, CSS — 1-day browser cache
          aws s3 sync ./_site/assets s3://${{ vars.AWS_S3_BUCKET }}/assets \
            --cache-control "public, max-age=86400" \
            --acl public-read
          # HTML, feed, sitemaps — 5-min browser cache with must-revalidate; --delete removes old pages
          aws s3 sync ./_site s3://${{ vars.AWS_S3_BUCKET }} \
            --exclude "assets/*" --exclude "*.map" \
            --cache-control "public, max-age=300, must-revalidate" \
            --acl public-read --delete
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1

      - name: Purge Cloudflare Cache
        if: success() && github.ref == 'refs/heads/main'
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'

  # ============================================================================
  # AI READINESS CHECK
  # ============================================================================

  nhs-score-check:
    name: NHS Score Check
    runs-on: ubuntu-24.04-arm
    needs: build-and-deploy
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request' &&
      needs.build-and-deploy.result == 'success'
    steps:
      - name: Check NHS score
        run: |
          RESPONSE=$(curl -sS -H 'User-Agent: nhs-score-check-action' \
            "https://nothumansearch.ai/api/v1/site/karun.me")
          SCORE=$(echo "$RESPONSE" | jq -r '.agentic_score // empty')

          if [ -z "$SCORE" ]; then
            echo "::warning::karun.me not yet indexed by NHS. Submitting for indexing (allow 24h)."
            curl -s -X POST "https://nothumansearch.ai/api/v1/submit" \
              -H 'Content-Type: application/json' \
              -H 'User-Agent: nhs-score-check-action' \
              -d '{"url":"https://karun.me"}' > /dev/null
            exit 0
          fi

          echo "NHS score: $SCORE / 100"
          if [ "$SCORE" -lt 30 ]; then
            echo "::error::Score $SCORE is below the minimum threshold of 30."
            exit 1
          fi
          echo "Score $SCORE >= 30. Pass."

  # ============================================================================
  # TEST SUMMARY
  # ============================================================================

  test-summary:
    name: Test Summary
    runs-on: ubuntu-24.04-arm
    if: always()
    needs: [changes, build, validate-content, lint-and-validate, visual-tests, functional-e2e-tests, performance-tests, build-and-deploy]
    steps:
      - name: Check results
        run: |
          echo "Theme changes detected: ${{ needs.changes.outputs.theme }}"
          echo ""

          if [[ "${{ needs.validate-content.result }}" != "success" ]]; then
            echo "❌ HTML validation failed. Deployment was blocked."
            echo "  - HTML validation: ${{ needs.validate-content.result }}"
            exit 1
          fi

          if [[ "${{ needs.changes.outputs.theme }}" == "false" ]]; then
            echo "✅ No theme changes - theme tests skipped, HTML validation passed, build/deploy proceeded"
            exit 0
          fi

          if [[ "${{ needs.lint-and-validate.result }}" != "success" || \
                "${{ needs.visual-tests.result }}" != "success" || \
                "${{ needs.functional-e2e-tests.result }}" != "success" || \
                "${{ needs.performance-tests.result }}" != "success" ]]; then
            echo "❌ Some tests failed. Deployment was blocked."
            echo "  - Lint: ${{ needs.lint-and-validate.result }}"
            echo "  - Visual: ${{ needs.visual-tests.result }}"
            echo "  - Functional E2E (includes a11y): ${{ needs.functional-e2e-tests.result }}"
            echo "  - Perf (includes Lighthouse thresholds): ${{ needs.performance-tests.result }}"
            exit 1
          fi

          if [[ "${{ needs.build-and-deploy.result }}" != "success" ]]; then
            echo "❌ Build/deploy failed."
            exit 1
          fi

          echo "✅ All tests passed (including Lighthouse thresholds) and deployment succeeded!"

  # ============================================================================
  # DEV.TO PUBLISHING
  # ============================================================================

  devto-publish:
    name: dev.to Publish
    runs-on: ubuntu-24.04-arm
    needs: build-and-deploy
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request' &&
      needs.build-and-deploy.result == 'success'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Publish new posts to dev.to
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          SITE_URL: https://karun.me
          POST_PATH: ${{ github.event.inputs.post_path }}
        run: node .github/scripts/devto-publish.js

      - name: Commit tracking file
        if: success()
        run: |
          if [ -f .devto-posts.json ] && ! git diff --quiet .devto-posts.json 2>/dev/null; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .devto-posts.json
            git commit -m "Update dev.to tracking"
            git push
          fi
