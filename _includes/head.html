<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  {% seo %}

  {% if page.layout == 'homepage' %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": {{ site.social.name | jsonify }},
    "url": {{ site.url | jsonify }},
    "sameAs": {{ site.social.links | jsonify }},
    "knowsAbout": ["AI-assisted engineering", "distributed systems", "platform engineering", "software architecture", "MLOps"]
  }
  </script>
  {% endif %}

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <!-- Pre-warm giscus connection before the comments script fires -->
  <link rel="preconnect" href="https://giscus.app" />
  <!-- Self-hosted fonts (no external CDN): deterministic rendering + faster load -->
  <link
    rel="preload"
    as="font"
    type="font/woff2"
    crossorigin
    href="{{ 'assets/fonts/open-sans/opensans-latin.woff2' | relative_url }}"
  />
  <!-- Stylesheets (moved from deferred loading to fix CLS) -->
  <link
    rel="stylesheet"
    href="{{ 'assets/css/fonts.css?v=' | append: site.github.build_revision | relative_url }}"
  />
  <link
    rel="stylesheet"
    href="{{ 'assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}"
  />
  <link
    rel="stylesheet"
    href="{{ 'assets/css/overrides.css?v=' | append: site.github.build_revision | relative_url }}"
  />
  {% if jekyll.environment == "production" and site.umami %}
  <!-- Umami Analytics -->
  <script defer src="{{ site.umami.src }}" data-website-id="{{ site.umami.website_id }}"></script>
  {% endif %}
</head>
