<aside class="author-bio" aria-label="About the author">
  <img
    src="https://github.com/{{ site.github_user }}.png"
    alt="{{ site.author }}"
    class="author-avatar"
    width="80"
    height="80"
    loading="lazy"
  >
  <div class="author-info">
    <h2 class="author-name">{{ site.author }}</h2>
    <p class="author-description">{{ site.author_bio }}</p>
  </div>
</aside>
