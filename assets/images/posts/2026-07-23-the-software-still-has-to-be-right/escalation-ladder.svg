<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 280" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <style>
      .stage { stroke: #1f2937; stroke-width: 2; stroke-linejoin: round; }
      .s1 { fill: #bbf7d0; }
      .s2 { fill: #fde68a; }
      .s3 { fill: #fecaca; }
      .stage-title { font-size: 16px; font-weight: 600; fill: #111827; text-anchor: middle; }
      .stage-line { font-size: 13px; fill: #374151; text-anchor: middle; }
      .stage-verdict { font-size: 13px; font-weight: 600; fill: #111827; text-anchor: middle; font-style: italic; }
      .axis-label { font-size: 13px; fill: #6b7280; font-style: italic; text-anchor: middle; }
      .axis { stroke: #6b7280; stroke-width: 1.5; fill: none; }
      .flow { stroke: #1f2937; stroke-width: 2; fill: none; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <marker id="axisArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Stage 1 -->
  <rect class="stage s1" x="20" y="50" width="210" height="130" rx="10"/>
  <text class="stage-title" x="125" y="80">Grooming</text>
  <text class="stage-line" x="125" y="104">Verbose story</text>
  <text class="stage-line" x="125" y="124">Visible. Reversible.</text>
  <text class="stage-verdict" x="125" y="154">The net is a bottleneck</text>

  <!-- Stage 2 -->
  <rect class="stage s2" x="275" y="50" width="210" height="130" rx="10"/>
  <text class="stage-title" x="380" y="80">Grooming, worse</text>
  <text class="stage-line" x="380" y="104">Poisoned story</text>
  <text class="stage-line" x="380" y="124">Invisible. Reversible.</text>
  <text class="stage-verdict" x="380" y="154">The net is a miss</text>

  <!-- Stage 3 -->
  <rect class="stage s3" x="530" y="50" width="210" height="130" rx="10"/>
  <text class="stage-title" x="635" y="80">Development</text>
  <text class="stage-line" x="635" y="104">Leaked secret, bad dependency</text>
  <text class="stage-line" x="635" y="124">Invisible. Irreversible.</text>
  <text class="stage-verdict" x="635" y="154">The miss is permanent</text>

  <!-- Flow arrows -->
  <line class="flow" x1="232" y1="115" x2="271" y2="115" marker-end="url(#arrow)"/>
  <line class="flow" x1="487" y1="115" x2="526" y2="115" marker-end="url(#arrow)"/>

  <!-- Stakes axis -->
  <line class="axis" x1="20" y1="225" x2="736" y2="225" marker-end="url(#axisArrow)"/>
  <text class="axis-label" x="380" y="250">Same failure shape, rising stakes</text>
</svg>
