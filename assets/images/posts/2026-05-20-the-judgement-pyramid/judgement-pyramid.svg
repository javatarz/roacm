<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <style>
      .layer { stroke: #1f2937; stroke-width: 2; stroke-linejoin: round; }
      .top { fill: #fde68a; }
      .mid { fill: #bfdbfe; }
      .bot { fill: #bbf7d0; }
      .layer-label { font-size: 17px; font-weight: 600; fill: #111827; text-anchor: middle; }
      .axis-label { font-size: 13px; fill: #6b7280; font-style: italic; text-anchor: middle; }
      .caption { font-size: 14px; fill: #374151; font-style: italic; text-anchor: middle; }
      .axis { stroke: #6b7280; stroke-width: 1.5; fill: none; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Top tier: Human (triangle apex) -->
  <polygon class="layer top" points="340,60 260,180 420,180" />
  <text class="layer-label" x="340" y="138">Human</text>

  <!-- Middle tier: LLM -->
  <polygon class="layer mid" points="260,180 420,180 500,300 180,300" />
  <text class="layer-label" x="340" y="247">LLM judgement</text>

  <!-- Bottom tier: Deterministic -->
  <polygon class="layer bot" points="180,300 500,300 580,420 100,420" />
  <text class="layer-label" x="340" y="367">Deterministic tools</text>

  <!-- Left axis: cost dimension -->
  <line class="axis" x1="70" y1="412" x2="70" y2="68" marker-start="url(#arrow)" marker-end="url(#arrow)" />
  <text class="axis-label" x="70" y="45">expensive</text>
  <text class="axis-label" x="70" y="445">cheap</text>

  <!-- Right axis: judgement dimension -->
  <line class="axis" x1="610" y1="412" x2="610" y2="68" marker-start="url(#arrow)" marker-end="url(#arrow)" />
  <text class="axis-label" x="610" y="45">judgement</text>
  <text class="axis-label" x="610" y="445">measurement</text>

  <!-- Caption -->
  <text class="caption" x="340" y="480">Push every check to the lowest layer that can do it reliably.</text>
</svg>
